<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="initial-scale=1, width=device-width" />
    <meta name="theme-color" content="#000000" />
    <meta http-equiv="Cross-Origin-Embedder-Policy" content="require-corp" />
    <meta http-equiv="Cross-Origin-Opener-Policy" content="same-origin" />
    <title>LIVI</title>
    <style>
      html,
            body,
            #root,
            #main,
            #videoContainer {
              margin: 0;
              padding: 0;
              width: 100vw;
              height: 100vh;
              overflow: hidden;
              background-color: #000000;
            }

            #main {
              display: grid;
              grid-template-columns: 74px auto;
            }

            #main-root {
              max-width: 100%;
              min-width: 0;
            }

            #nav-root {
              width: 75px;
            }

            /* Video underlay (compositor on Linux, NSView on mac) */
            html.show-video,
            html.show-video body,
            html.show-video #root,
            html.show-video #main,
            html.show-video #videoContainer,
            html.show-cluster,
            html.show-cluster body,
            html.show-cluster #root,
            html.show-cluster #main,
            html.show-cluster #videoContainer,
            html.show-cluster #telemetry-root {
              background-color: transparent;
            }

            /* Instant boot splash: three pulsing dots painted by the very first
               HTML frame (before the React bundle parses/mounts) so the screen
               shows "powered on / loading" the moment the compositor lights the
               panel. React replaces #root on mount, which removes it. */
            #boot-splash {
              position: fixed;
              inset: 0;
              display: flex;
              align-items: center;
              justify-content: center;
              gap: 28px;
              background-color: #000000;
              z-index: 2147483647;
            }
            #boot-splash span {
              width: 26px;
              height: 26px;
              border-radius: 50%;
              background-color: #ffffff;
              animation: boot-splash-pulse 1.2s ease-in-out infinite;
            }
            #boot-splash span:nth-child(2) {
              animation-delay: 0.2s;
            }
            #boot-splash span:nth-child(3) {
              animation-delay: 0.4s;
            }
            @keyframes boot-splash-pulse {
              0%,
              100% {
                opacity: 0.5;
              }
              50% {
                opacity: 1;
              }
            }
    </style>
  </head>
  <body>
    <div id="root">
      <div id="boot-splash">
        <span></span>
        <span></span>
        <span></span>
      </div>
    </div>
    <script type="module" src="./src/main.tsx"></script>
  </body>
</html>
